<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Planet Flota | Control de Taxi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root { 
        var(--primary): #1a365d; 
        var(--accent): #2b6cb0; 
        var(--cyan): #63b3ed; 
        var(--bg): #f0f4f8; 
    }
    
    body { background-color: var(--bg); font-family: 'Montserrat', sans-serif; padding-bottom: 90px; }
    
    .header { background-color: #1a365d; color: white; padding: 15px 20px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f6e05e; }
    .btn-close-dash { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); padding: 5px 15px; color: white; border-radius: 8px; font-weight: bold; font-size: 0.8rem; text-decoration: none; }
    
    .card-balance { padding: 25px; color: white; border-radius: 20px; text-align: center; background: linear-gradient(135deg, #2d3748, #1a202c); box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 15px; border: 1px solid #4a5568; }
    .card-balance h1 { color: #f6e05e; font-weight: 800; font-size: 2.8rem; letter-spacing: -1px; }
    
    .card-k { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
    .card-title-k { font-weight: 700; color: #1a365d; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    .btn-taxi { background-color: #2b6cb0; border: none; font-weight: bold; padding: 12px; font-size: 1rem; border-radius: 10px; transition: 0.2s; color: white; width: 100%; box-shadow: 0 4px 6px rgba(43, 108, 176, 0.2); }
    .btn-taxi:hover { background-color: #1e4e8c; transform: translateY(-2px); }
    .btn-taxi-danger { background-color: #e53e3e; box-shadow: 0 4px 6px rgba(229, 62, 62, 0.2); }
    .btn-taxi-danger:hover { background-color: #c53030; }
    
    .form-control { border: 2px solid #e2e8f0; border-radius: 8px; padding: 10px 15px; font-weight: bold; color: #2d3748; }
    .form-control:focus { border-color: #63b3ed; box-shadow: 0 0 0 3px rgba(99,179,237,0.2); }
    
    .alert-doc { border-left: 4px solid #f6ad55; background: #fffaf0; }
    
    .dummy-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
    .dummy-row:last-child { border-bottom: none; }
    
    .blur-overlay { position: relative; }
    .blur-overlay::after { content: "Módulo Premium"; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(255,255,255,0.7); backdrop-filter: blur(3px); display: flex; justify-content: center; align-items: center; font-weight: 800; color: #1a365d; font-size: 1.5rem; border-radius: 15px; }
  </style>
</head>
<body>

  <div class="header">
    <div>
        <h4 class="m-0 fw-bold"><i class="fas fa-taxi" style="color: #f6e05e;"></i> Planet<span style="color:#f6e05e;">.Flota</span></h4>
        <small class="opacity-75">Unidad de Negocio Aislada</small>
    </div>
    <a class="btn-close-dash" href="index.html">Volver a Tienda</a>
  </div>

  <div class="container-fluid px-3 mt-3">
    
    <div class="card-balance">
        <small class="text-uppercase fw-bold" style="color: #a0aec0; letter-spacing: 1px;">Utilidad Neta (Carro)</small>
        <h1 class="my-2">$1,250,000</h1>
        <div class="d-flex justify-content-center gap-3 mt-3">
            <div class="text-end border-end pe-3 border-secondary">
                <small class="d-block text-muted fw-bold">Recaudo Bruto</small>
                <span class="fw-bold" style="color: #68d391;">$2,400,000</span>
            </div>
            <div class="text-start ps-2">
                <small class="d-block text-muted fw-bold">Gastos (OPEX)</small>
                <span class="fw-bold" style="color: #fc8181;">-$1,150,000</span>
            </div>
        </div>
    </div>

    <div class="card-k">
        <h6 class="card-title-k"><i class="fas fa-hand-holding-usd text-success"></i> Ingresar Cuota Diaria</h6>
        <select class="form-select fw-bold mb-2" style="border-color: #cbd5e0;">
            <option>Conductor: Juan Perez</option>
        </select>
        <input type="number" class="form-control mb-3" placeholder="Valor entregado hoy ($)">
        <button class="btn-taxi" onclick="triggerPaywall()">GUARDAR RECAUDO EN CAJA</button>
    </div>

    <div class="card-k">
        <h6 class="card-title-k"><i class="fas fa-tools text-danger"></i> Registrar Salida / Gasto del Vehículo</h6>
        <div class="row g-2 mb-2">
            <div class="col-6"><input type="text" class="form-control" placeholder="Ej: Aceite, Llantas..."></div>
            <div class="col-6">
                <select class="form-select fw-bold">
                    <option>Preventivo</option>
                    <option>Correctivo (Daño)</option>
                    <option>Tarjetón / Admin</option>
                </select>
            </div>
        </div>
        <input type="number" class="form-control mb-3" placeholder="Costo de la reparación ($)">
        <button class="btn-taxi btn-taxi-danger" onclick="triggerPaywall()">REGISTRAR GASTO AL VEHÍCULO</button>
    </div>

    <div class="card-k blur-overlay">
        <h6 class="card-title-k"><i class="fas fa-bell text-warning"></i> Alertas y Vencimientos</h6>
        <div class="alert alert-doc p-2 mb-2">
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold text-dark small">SOAT</span>
                <span class="badge bg-danger">Vence en 12 días</span>
            </div>
        </div>
        <div class="alert p-2 mb-2" style="background: #f0f4f8; border: 1px solid #e2e8f0;">
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold text-dark small">Revisión Tecnomecánica</span>
                <span class="badge bg-success">Vigente (8 meses)</span>
            </div>
        </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    function triggerPaywall() {
        Swal.fire({
            icon: 'lock',
            title: 'Módulo Premium Requerido',
            html: '<b>Planet Flota</b> es un centro de costos independiente diseñado para no mezclar la caja de la tienda con la del vehículo.<br><br>Adquiere la licencia de este módulo por pago único de <b>$250.000 COP</b> y obtén control de rentabilidad y alertas automáticas de SOAT.',
            confirmButtonText: '<i class="fab fa-whatsapp"></i> Hablar con A.S.T Soluciones',
            confirmButtonColor: '#2b6cb0',
            showCancelButton: true,
            cancelButtonText: 'Cerrar',
            cancelButtonColor: '#a0aec0',
            imageUrl: 'https://cdn-icons-png.flaticon.com/512/2916/2916315.png',
            imageWidth: 80
        }).then((result) => {
            if (result.isConfirmed) {
                // Reemplaza el número por tu número real de A.S.T.
                window.open("https://wa.me/573000000000?text=Hola%20Gerson,%20quiero%20activar%20el%20módulo%20de%20Taxi%20en%20mi%20Planet%20Shop.", "_blank");
            }
        });
    }
  </script>
</body>
</html>
